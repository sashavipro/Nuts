{% extends "base.html" %}
{% load wagtailcore_tags i18n %}

{% block content %}
<section class="term">
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h1 style="margin-bottom: 30px;">{{ page.title }}</h1>
                <div class="richtext-content">
                    {{ page.body|richtext }}
                </div>
            </div>
        </div>
    </div>
</section>

{# Вывод подвала с контактами #}
{% for block in page.footer_blocks %}
    {% include_block block %}
{% endfor %}

{% endblock %}
